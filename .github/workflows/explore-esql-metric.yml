---
name: 'Explore: ES|QL Metric'
on:
  schedule:
    - cron: 30 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-esql-metric-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-esql-metric-${{ matrix.kibana_version }}]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the ES|QL Metric Explorer for kb-yaml-to-lens.
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for ES|QL **metric** panels
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## ES|QL query configuration
        Queries can be specified as:
        - A single string: `query: "FROM logs-* | STATS count = COUNT()"`
        - A list of strings (joined with pipes):
          ```yaml
          query:
            - FROM logs-*
            - STATS count = COUNT(), avg_bytes = AVG(bytes)
          ```
        - `time_field` (optional, default: `@timestamp`) ŌĆö used for time picker

        ## ES|QL column configuration
        - `field` (required) ŌĆö field name from ES|QL query result
        - `label` (optional) ŌĆö custom display label
        - `format` (optional) ŌĆö `number`, `bytes`, `bits`, `percent`, `duration`
          with `decimals`, `suffix`, `compact` params; or custom `pattern`

        ## Compiler-supported features to test

        ### Config slots
        - **primary** (required) ŌĆö main metric to display
        - **secondary** (optional) ŌĆö companion metric (trend/comparison)
        - **maximum** (optional) ŌĆö for progress bar display
        - **breakdown** (optional) ŌĆö dimension to split metrics by

        ### Appearance (`appearance:`)
        - `apply_to` ŌĆö color target: `value` or `background` (default: `background`)
        - `title_position` ŌĆö `top` or `bottom`
        - `value_font_size` ŌĆö `default`, `xs`, `s`, `m`, `l`, `xl`, `xxl`

        ### Color (`color:`)
        - `palette` ŌĆö categorical or range color palette
        - `range_type` ŌĆö `number` or `percent`
        - `range_min`, `range_max` ŌĆö custom range bounds
        - `continuity` ŌĆö `above`, `below`, `all`, `none`
        - `stops` ŌĆö list of `{stop, color}` for threshold coloring

        ### Titles and text (`titles_and_text:`)
        - `prefix` ŌĆö text before the value
        - `suffix` ŌĆö text after the value
        - `secondary_prefix` ŌĆö text before secondary metric
        - `secondary_suffix` ŌĆö text after secondary metric

        ## NOT implemented for ES|QL (do NOT flag as bugs)
        - **Formula metrics** ŌĆö ES|QL uses query-computed columns, not formulas
        - **Aggregation functions in metrics** ŌĆö aggregations must be done in
          the query via STATS
        - **Panel-level filters** ŌĆö all filtering must be in the ES|QL query
        - **Normalize by unit** ŌĆö not supported in compiler
        - Tooltip configuration ŌĆö no compiler option

        ## Creative exploration
        - ES|QL metric with `STATS count = COUNT()` as primary
        - ES|QL metric with primary + secondary from same query
        - ES|QL metric with maximum value for progress bar
        - ES|QL metric with breakdown by `host.name`
        - ES|QL metric with color stops (green/yellow/red thresholds)
        - ES|QL metric with prefix/suffix text
        - ES|QL metric with `apply_to: value` vs `apply_to: background`
        - ES|QL metric with bytes format + compact notation
        - Compare ES|QL metric vs equivalent Lens metric side-by-side

        ## Verification process
        Read `.github/agent-guides/explore-verification.md` for the full
        verification process, fields to ignore in diffs, classification
        rules, and deliverable format.

        The issue title MUST follow this format:
        `[explore-esql-metric-${{ matrix.kibana_version }}] N bugs, M gaps`

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
