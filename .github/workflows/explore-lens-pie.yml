---
name: 'Explore: Lens Pie/Donut'
on:
  schedule:
    - cron: 30 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-lens-pie-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-lens-pie-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the Lens Pie/Donut Explorer for kb-yaml-to-lens.
        You are the ONLY agent with access to a live Kibana instance and Playwright.
        Any agent can read code â€” your unique value is verifying things in the actual UI.
        **You MUST use Playwright and Kibana. Code-only analysis is not acceptable.**
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for **pie and donut** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## Compiler-supported features to test

        ### Config slots (Kibana editor drop zones)
        - **Slice by** (required) â€” one or more dimensions (primary + secondary groups)
        - **Metric** (required) â€” one or more metrics for slice sizes

        ### Shape (`appearance:`)
        - Pie (default) â€” no donut setting or `appearance.donut` omitted
        - Donut â€” `appearance.donut: small` (0.3), `medium` (0.5), `large` (0.7)

        ### Dimension types (`dimensions:`)
        - `type: values` â€” top values/terms with `field`, `size`, `other_bucket`,
          `missing_bucket`, `include`/`exclude`
        - `type: date_histogram` â€” with `field`, `minimum_interval`
        - `type: intervals` â€” numeric ranges
        - `type: filters` â€” KQL filter-based
        - Multiple dimensions create nested rings (primaryGroups + secondaryGroups)

        ### Metric types (`metrics:`)
        All standard aggregations: `count`, `sum`, `average`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `percentile_rank`,
        `standard_deviation`, `formula`

        ### Slice labels and values (`titles_and_text:`)
        - `slice_labels` â€” `hide`, `inside`, `auto` (default: auto)
        - `slice_values` â€” `hide`, `integer`, `percent` (default: percent)
        - `value_decimal_places` â€” 0-10 (default: 2)

        ### Legend (`legend:`)
        - `visible` â€” `show`, `hide`, `auto`
        - `position` â€” `top`, `right` (default), `bottom`, `left`
        - `width` â€” `small`, `medium`, `large`, `extra_large`
        - `truncate_labels` â€” 0-5 lines
        - `nested` â€” boolean for hierarchical legend
        - `show_single_series` â€” boolean

        ### Color (`color:`)
        - `palette` â€” EUI color scheme
        - `assignments` â€” manual value-to-color hex mappings

        ## NOT implemented in compiler (do NOT flag as bugs)
        - Tooltip configuration â€” no compiler option
        - Minimum slice percentage â€” not explicitly supported (use Terms `size`
          and `other_bucket` instead)

        ## Creative exploration
        After covering the feature matrix, try interesting combinations:
        - Donut with 2 nested ring dimensions + custom color assignments
        - Pie with filters dimension (e.g. error vs warning vs info)
        - Large donut with `slice_labels: inside` + `slice_values: percent`
        - Pie with `other_bucket: true` + small `size` to show grouping
        - Multiple metrics on a single pie (test emptySizeRatio behavior)
        - Formula-based metric as pie slice size
        - Pie chart inside a collapsible section

        ## Verification process
        Read `.github/agent-guides/explore-verification.md` for the full
        verification process, fields to ignore in diffs, classification
        rules, and deliverable format.

        The issue title MUST follow this format:
        `[explore-lens-pie-${{ matrix.kibana_version }}] N bugs, M gaps`

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
