---
name: 'Audit: Integrations Decompile Fuzz'
on:
  schedule:
    - cron: 30 12 * * 3
  workflow_dispatch: null
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[integrations-decompile-fuzz]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        just all install
        git clone --depth=1 https://github.com/elastic/integrations.git integrations
        mkdir -p .audit/decompile/output

        total=0; successes=0; failures=0
        > .audit/decompile/errors.log
        > .audit/decompile/failures.csv

        echo "file,error_message" >> .audit/decompile/failures.csv

        for f in integrations/packages/*/kibana/dashboard/*.json; do
          [ -f "$f" ] || continue
          total=$((total + 1))
          rel="${f#integrations/}"
          out=".audit/decompile/output/$(basename "$f" .json).yaml"
          if output=$(uv run kb-dashboard decompile "$f" -o "$out" 2>&1); then
            successes=$((successes + 1))
          else
            failures=$((failures + 1))
            errmsg=$(printf '%s\n' "$output" | grep -v '^[[:space:]]*$' | tail -1 || true)
            [ -z "$errmsg" ] && errmsg="UNKNOWN_ERROR_NO_MESSAGE (exit code non-zero, no output)"
            echo "FAIL: $rel -- $errmsg" >> .audit/decompile/errors.log
            printf '%s,"%s"\n' "\"$rel\"" "$errmsg" >> .audit/decompile/failures.csv
          fi
        done

        rate=0
        [ "$total" -gt 0 ] && rate=$((successes * 100 / total))

        printf '{"total": %d, "successes": %d, "failures": %d, "success_rate": "%d%%"}\n' \
          "$total" "$successes" "$failures" "$rate" > .audit/decompile/summary.json

        echo "Decompiled $successes/$total dashboards ($rate% success, $failures failures)"
      additional-instructions: |
        You are auditing the kb-yaml-to-lens decompiler against all JSON dashboards in elastic/integrations.
        Setup has already cloned integrations and run `kb-dashboard decompile` on every dashboard.

        Artifacts:
        - `.audit/decompile/summary.json` — total/success/failure counts
        - `.audit/decompile/failures.csv` — each failure with file path and error message
        - `.audit/decompile/errors.log` — one-line-per-failure log
        - `.audit/decompile/output/` — successfully decompiled YAML files

        ## Mission
        Produce one high-signal issue that summarizes decompiler fuzz results.

        ## Required process
        - Read `summary.json` for the overview.
        - Read `failures.csv` and group by error message.
        - Classify each error group as: decompiler bug, unsupported feature, or malformed input.
        - Prioritize by count (most frequent first).
        - Do not open PRs; open a single issue only.

        ## Issue content
        1. **Summary table:** total dashboards, successes, failures, success rate
        2. **Grouped errors table:** error message, count, example files, likely root cause
        3. **Actionable recommendations** prioritized by impact

        ## Issue title
        Use: `N dashboards tested, X succeeded, Y failed`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
