---
name: 'Explore: Lens Datatable'
on:
  schedule:
    - cron: 50 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-lens-datatable-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-lens-datatable-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the Lens Datatable Explorer for kb-yaml-to-lens.
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for **datatable** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## Compiler-supported features to test

        ### Config slots
        - **Metrics** — one or more aggregation columns
        - **Dimensions** — row grouping columns
        - At least one metric OR dimension is required

        ### Per-column appearance (metrics and dimensions)
        - `appearance.width` — column width in pixels
        - `appearance.hidden` — hide column (boolean)
        - `appearance.one_click_filter` — click-to-filter (boolean)
        - `appearance.alignment` — `left`, `right`, `center`

        ### Metric column extras
        - `appearance.summary_row` — `none`, `sum`, `avg`, `count`, `min`, `max`
        - `appearance.summary_label` — custom label for summary row
        - `appearance.color` — cell/text coloring:
          - `apply_to` — `none`, `cell`, `text`
          - `range_type` — `number` or `percent`
          - `range_min`, `range_max`, `continuity`
          - `stops` — color range `[{stop, color}]`

        ### Table layout (`appearance:`)
        - `row_height` — `auto`, `single`, `custom`
        - `row_height_lines` — lines for custom
        - `header_row_height` — `auto`, `single`, `custom`
        - `header_row_height_lines`
        - `density` — `compact`, `normal`, `expanded`

        ### Sorting and pagination
        - `sorting.column_id`, `sorting.direction` (`asc`/`desc`)
        - `paging.enabled` (boolean), `paging.page_size` (number)

        ### Metric and dimension types
        All standard aggregations and dimension types. See XY workflow for
        full list.

        ## NOT implemented in compiler (do NOT flag as bugs)
        - Transpose — Kibana supports this but compiler does not
        - Tooltip configuration

        ## Creative exploration
        - Table with 3 dimensions + 2 metrics + summary rows
        - Cell color gradient (green/yellow/red) on a percent metric
        - Mixed alignment: left dimensions, right metrics
        - Hidden column for sorting only
        - Compact density + custom row height
        - Formula metric in summary row
        - date_histogram + multiple aggregation columns
        - Pagination with page_size: 25

        ## Required process

        ### Prereq: Read compiler source
        Read the relevant compiler source in `packages/kb-dashboard-core/src/`
        to understand every supported config option and the view model defaults.

        ### Part 1: Compile YAML → Import → Verify in Kibana
        For each supported feature:
        a. **Author** a minimal YAML config exercising the feature.
        b. **Compile** it: `just cli compile --input-file <file> --output-dir /tmp/compiled/`
        c. **Import** the compiled NDJSON into Kibana:
           `curl -X POST "http://localhost:5601/api/saved_objects/_import?overwrite=true" \
             -H "kbn-xsrf: true" --form file=@/tmp/compiled/<file>.ndjson`
        d. **Open** the imported panel in the Kibana editor and verify:
           - Every setting you specified in YAML is reflected in the UI
           - No settings are lost or silently dropped
           - The panel renders without errors
           - Kibana does not show warnings or "invalid" states
        e. **Record** the result: feature name, YAML used, pass/fail, notes.

        ### Part 2: Create fresh panels in Kibana → Export → Compare to compiler
        a. **Manually create** many fresh panels in Kibana from scratch, using
           a wide variety of settings. Cover edge cases, unusual combinations,
           and settings you haven't seen exercised in the YAML configs.
        b. **Export** the dashboard:
           `curl "http://localhost:5601/api/saved_objects/_export" \
             -H "kbn-xsrf: true" -H "Content-Type: application/json" \
             -d '{"type":"dashboard","includeReferencesDeep":true}'`
        c. **Inspect** the exported JSON and compare it against the compiler's
           view models and defaults. Look for:
           - Fields or settings Kibana produces that the compiler doesn't know about
           - Default values that differ from what the compiler sets
           - Structural patterns the compiler gets wrong
        d. **Record** any discrepancies as potential compiler bugs or feature gaps.

        ### Classify findings
        - **Bug**: The compiler produces incorrect JSON for a setting it claims
          to support — wrong field name, wrong value, wrong structure.
        - **Gap**: Kibana supports a setting or field that the compiler has no
          config option for. Note it, but do NOT treat it as a bug.
        - **Pass**: Compiled output works correctly in Kibana.

        ## Deliverable

        **If no bugs are found**, do not create an issue. No-op.

        **If bugs or significant findings exist**, create one GitHub issue titled:
        `[explore-lens-datatable-${{ matrix.kibana_version }}] Round-trip verification report`

        Structure the issue body with these **collapsed sections** (`<details>`):

        <details><summary>Compiler Bugs</summary>
        For each bug: feature name, YAML config or exported JSON showing the
        problem, what the compiler produces vs what Kibana expects.
        </details>

        <details><summary>Features Verified (passed)</summary>
        | Feature | YAML Config | Status | Notes |
        | --- | --- | --- | --- |
        </details>

        <details><summary>Feature Gaps (not in compiler)</summary>
        Settings or fields found in Kibana exports that the compiler doesn't
        support. Include the relevant JSON snippet.
        </details>

        <details><summary>Creative Exploration Results</summary>
        Document each interesting combination attempted and outcome.
        </details>

        Top-level summary: total features tested, passed, bugs found,
        gaps identified, version-specific notes.

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
