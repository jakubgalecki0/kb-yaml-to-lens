---
name: 'Explore: Kibana Saved Objects from Spec (8.19)'
on:
  issue_comment:
    types:
      - created
permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write
  id-token: write
concurrency:
  group: explore-workflows-${{ github.ref }}
  cancel-in-progress: false
jobs:
  run:
    if: (startsWith(github.event.comment.body, '/explore8') || startsWith(github.event.comment.body, '/explore ') || github.event.comment.body == '/explore') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-kibana-saved-objects-8.19]'
      setup-commands: |
        make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap 8.19.0
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Goal
        Validate compiler behavior by interacting with a live Kibana instance — compile
        YAML, import into Kibana, verify in the UI, create fresh panels, export, and
        compare against compiler output.

        ## Mode detection
        - Trigger comment: `${{ github.event.comment.body }}`
        - Issue number: `${{ github.event.issue.number }}`
        - PR URL (present only for PR comments): `${{ github.event.issue.pull_request.url }}`
        - If PR URL is present, run in **PR validation mode**.
        - Otherwise, run in **feature exploration mode**.

        ## Input
        - Treat text after `/explore8` as the detailed specification.
        - If the comment is only `/explore8`, infer a reasonable narrow spec from issue/PR context and state your assumption.
        - Kibana version: **8.19.0**
        - Seeded indices: `logs-default-generic`, `metrics-default-generic`
        - Data views: `logs-*`, `metrics-*`

        ## Required workflow
        1. Read `.github/agent-guides/explore-agents/getting-started.md` and all files it references.
        2. If running in PR validation mode:
           - Read the PR title/body and extract the claimed bug fix / feature scope.
           - Check out and use the PR head branch for all compile/validation steps.
           - Read the compiler source for the relevant chart type to understand every config option.
           - Follow `.github/agent-guides/explore-agents/verification.md` — both Part 1 and Part 2.
           - Part 1 (compile → import → verify UI): Author YAML configs that exercise every
             setting the PR claims to support. Compile, import into Kibana, open in the editor,
             and confirm each setting is visible in the UI controls. This is the most important
             check — if a setting doesn't appear in the Kibana editor, it's broken.
           - Part 2 (create in Kibana → export → compare to compiler): Create fresh panels in
             Kibana using a variety of settings, export the dashboard, and compare the JSON
             against the compiler's view models and defaults. Look for fields the compiler gets
             wrong or doesn't know about.
           - Report whether the PR claim is truly implemented, partially implemented, or incorrect.
        3. If running in feature exploration mode:
           - Use Playwright (Chromium) to automate Kibana and create the target visualization.
           - If no data view exists for the target index, create one (see guide).
        4. Export saved objects using the CLI:
           ```bash
           uv run kb-dashboard fetch <dashboard-id> --output artifacts/<name>.ndjson \
             --kibana-url http://host.docker.internal:443
           ```
           Use `uv run kb-dashboard compile --input-file <file> --output-dir /tmp/compiled/ --upload --kibana-url http://host.docker.internal:443` to compile and upload in one step (do NOT use curl or the Kibana import UI).
        5. Implement compiler support in this repo using existing patterns (feature exploration mode only).
        6. Add/update tests for config -> compiled Lens output mapping.
        7. Run targeted validation for touched files and tests.
        8. Add/update docs/examples if user-facing behavior changed.

        ## Guardrails
        - Be surgical; avoid broad refactors.
        - Follow existing naming/style conventions.
        - If blocked, report exact blocker and reproduction steps.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
