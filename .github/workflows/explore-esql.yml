---
name: 'Explore: ES|QL Panels'
on:
  schedule:
    - cron: 20 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-esql-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-esql-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the ES|QL Panels Explorer for kb-yaml-to-lens.
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for **ES|QL** panels across all
        chart types against **Kibana ${{ matrix.kibana_version }}**.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## Features to test
        ES|QL panels use inline queries instead of data views. Test each chart type:
        bar, line, area, pie, metric, datatable, gauge, heatmap, tagcloud, mosaic, waffle.

        For each chart type test:
        - ES|QL query syntax (FROM, WHERE, STATS, SORT, LIMIT, EVAL)
        - Column mapping to chart axes
        - Multiple metrics via STATS
        - Time-based queries with EVAL + BUCKET for date histograms
        - EVAL constants for computed fields
        - Reference lines on XY charts (if supported)
        - Annotation layers on XY charts (if supported)
        - All axis, legend, color, and formatting options
        - Metric-specific: maximum, secondary metric, breakdown
        - Gauge-specific: shapes, bands, min/max
        - Pie-specific: donut, labels, slices
        - Datatable-specific: sorting, summary row, column formatting

        ## Required process
        1. Read compiler source for ES|QL chart configs to discover all options.
        2. For EACH feature: author YAML, compile, import, verify in editor,
           manually recreate, export both, compare, record status.
        3. Note behavioral differences specific to Kibana ${{ matrix.kibana_version }}.
        4. Note any ES|QL-specific limitations vs Lens data-view-based equivalents.

        ## Deliverable
        Create one GitHub issue titled:
        `[explore-esql-${{ matrix.kibana_version }}] Feature coverage report`

        Include: feature coverage table (grouped by chart type), summary stats,
        bugs with YAML repro, version-specific notes, compiler gaps,
        ES|QL vs Lens parity notes.
        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
