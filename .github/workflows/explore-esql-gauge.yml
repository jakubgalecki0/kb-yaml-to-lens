---
name: 'Explore: ES|QL Gauge'
on:
  schedule:
    - cron: 40 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-esql-gauge-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-esql-gauge-${{ matrix.kibana_version }}]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the ES|QL Gauge Explorer for kb-yaml-to-lens.
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for ES|QL **gauge** charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## ES|QL query configuration
        Queries can be specified as:
        - A single string: `query: "FROM logs-* | STATS count = COUNT()"`
        - A list of strings (joined with pipes):
          ```yaml
          query:
            - FROM logs-*
            - STATS count = COUNT(), max_val = MAX(bytes)
          ```
        - `time_field` (optional, default: `@timestamp`) — used for time picker

        ## ES|QL column configuration
        - `field` (required) — field name from ES|QL query result
        - `label` (optional) — custom display label
        - `format` (optional) — `number`, `bytes`, `bits`, `percent`, `duration`
          with `decimals`, `suffix`, `compact` params; or custom `pattern`

        ## Compiler-supported features to test

        ### Config slots
        - **metric** (required) — primary gauge value
        - **minimum** (optional) — minimum bound (ES|QL column or static)
        - **maximum** (optional) — maximum bound (ES|QL column or static)
        - **goal** (optional) — goal marker value (ES|QL column or static)

        ### Gauge shapes (`appearance.shape:`)
        - `horizontal_bullet` — horizontal bar gauge
        - `vertical_bullet` — vertical bar gauge
        - `arc` — arc/needle gauge
        - `circle` — full circle gauge
        - `semi_circle` — half circle gauge

        ### Appearance (`appearance:`)
        - `ticks_position` — `auto`, `bands`, `hidden`
        - `labels` — show/hide value labels

        ### Color palette (`color:`)
        - `palette` — color palette for gauge bands
        - `range_type` — `number` or `percent`
        - `range_min`, `range_max` — band boundaries
        - `continuity` — `above`, `below`, `all`, `none`
        - `stops` — list of `{stop, color}` for band thresholds

        ### Titles and text (`titles_and_text:`)
        - `subtitle` — text below the gauge title

        ## NOT implemented for ES|QL (do NOT flag as bugs)
        - **Formula metrics** — ES|QL uses query-computed columns, not formulas
        - **Aggregation functions in metrics** — aggregations must be done in
          the query via STATS
        - **Panel-level filters** — all filtering must be in the ES|QL query
        - Tooltip configuration — no compiler option

        ## Creative exploration
        - ES|QL gauge with `STATS avg_cpu = AVG(system.cpu.total.pct)`
        - ES|QL gauge with computed min/max from same query
        - ES|QL gauge with goal value
        - Each of the 5 gauge shapes with the same metric
        - ES|QL gauge with color stops (green/yellow/red bands)
        - ES|QL gauge with percent format + compact
        - ES|QL gauge with subtitle text
        - Compare ES|QL gauge vs equivalent Lens gauge side-by-side

        ## Verification process
        Read `.github/agent-guides/explore-verification.md` for the full
        verification process, fields to ignore in diffs, classification
        rules, and deliverable format.

        The issue title MUST follow this format:
        `[explore-esql-gauge-${{ matrix.kibana_version }}] N bugs, M gaps`

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
