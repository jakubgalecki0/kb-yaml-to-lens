---
name: 'Explore: ES|QL Gauge'
on:
  schedule:
    - cron: 40 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-esql-gauge-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-esql-gauge-${{ matrix.kibana_version }}]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for ES|QL **gauge** charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.
        Data views: `logs-*`, `metrics-*`.

        ## ES|QL query configuration
        Queries can be specified as:
        - A single string: `query: "FROM logs-* | STATS count = COUNT()"`
        - A list of strings (joined with pipes):
          ```yaml
          query:
            - FROM logs-*
            - STATS count = COUNT(), max_val = MAX(bytes)
          ```
        - `time_field` (optional, default: `@timestamp`) тАФ used for time picker

        ## ES|QL column configuration
        - `field` (required) тАФ field name from ES|QL query result
        - `label` (optional) тАФ custom display label
        - `format` (optional) тАФ `number`, `bytes`, `bits`, `percent`, `duration`
          with `decimals`, `suffix`, `compact` params; or custom `pattern`

        ## Compiler-supported features to test

        ### Config slots
        - **metric** (required) тАФ primary gauge value
        - **minimum** (optional) тАФ minimum bound (ES|QL column or static)
        - **maximum** (optional) тАФ maximum bound (ES|QL column or static)
        - **goal** (optional) тАФ goal marker value (ES|QL column or static)

        ### Gauge shapes (`appearance.shape:`)
        - `horizontal_bullet` тАФ horizontal bar gauge
        - `vertical_bullet` тАФ vertical bar gauge
        - `arc` тАФ arc/needle gauge
        - `circle` тАФ full circle gauge
        - `semi_circle` тАФ half circle gauge

        ### Appearance (`appearance:`)
        - `ticks_position` тАФ `auto`, `bands`, `hidden`
        - `labels` тАФ show/hide value labels

        ### Color palette (`color:`)
        - `palette` тАФ color palette for gauge bands
        - `range_type` тАФ `number` or `percent`
        - `range_min`, `range_max` тАФ band boundaries
        - `continuity` тАФ `above`, `below`, `all`, `none`
        - `stops` тАФ list of `{stop, color}` for band thresholds

        ### Titles and text (`titles_and_text:`)
        - `subtitle` тАФ text below the gauge title

        ## Creative exploration
        - ES|QL gauge with `STATS avg_cpu = AVG(system.cpu.total.pct)`
        - ES|QL gauge with computed min/max from same query
        - ES|QL gauge with goal value
        - Each of the 5 gauge shapes with the same metric
        - ES|QL gauge with color stops (green/yellow/red bands)
        - ES|QL gauge with percent format + compact
        - ES|QL gauge with subtitle text
        - Compare ES|QL gauge vs equivalent Lens gauge side-by-side

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
