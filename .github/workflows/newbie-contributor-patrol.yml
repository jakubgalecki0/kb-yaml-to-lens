---
name: Newbie Contributor Patrol
on:
  schedule:
    - cron: 0 11 * * 1
  workflow_dispatch: null
permissions:
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-newbie-contributor-patrol.lock.yml@main
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
