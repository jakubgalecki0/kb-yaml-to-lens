---
name: 'Explore: Lens Heatmap'
on:
  schedule:
    - cron: 0 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-lens-heatmap-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.14.0","8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-lens-heatmap-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for **heatmap** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.
        Data views: `logs-*`, `metrics-*`.

        ## Compiler-supported features to test

        ### Config slots
        - **x_axis** (required) — horizontal dimension (date_histogram, terms)
        - **y_axis** (optional) — vertical dimension (terms)
        - **value** (required) — cell color intensity metric

        ### Grid configuration (`grid_config:`)
        - `cells.show_labels` — show value labels in cells (boolean)
        - `x_axis.show_labels` — show x-axis labels (boolean)
        - `x_axis.show_title` — show x-axis title (boolean)
        - `y_axis.show_labels` — show y-axis labels (boolean)
        - `y_axis.show_title` — show y-axis title (boolean)

        ### Legend (`legend:`)
        - `visible` — `show` or `hide` (NOTE: heatmap does NOT support `auto`)
        - `position` — `top`, `right` (default), `bottom`, `left`

        ### Dimension types
        - `type: values` — top values/terms
        - `type: date_histogram` — time bucketing
        - `type: intervals` — numeric ranges

        ### Metric types
        All standard aggregations: `count`, `average`, `sum`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `formula`, etc.

        ## Creative exploration
        - Heatmap with date_histogram x-axis + terms y-axis + average metric
        - Heatmap with cell labels shown + hidden legend
        - Heatmap with only x-axis (no y-axis) — single row
        - Heatmap with interval dimension on x-axis
        - Heatmap with formula metric
        - All axis labels/titles toggled off

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
