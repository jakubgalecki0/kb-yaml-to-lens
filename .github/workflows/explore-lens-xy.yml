---
name: 'Explore: Lens XY Charts (Bar/Line/Area)'
on:
  schedule:
    - cron: 0 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-workflows-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.14.0","8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-lens-xy-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for **bar, line, and area** Lens
        charts against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.
        Data views: `logs-*`, `metrics-*`.

        ## Compiler-supported features to test

        ### Config slots (Kibana editor drop zones)
        - **Horizontal axis** (optional) — dimension (x-axis)
        - **Vertical axis** (required) — one or more metrics (y-axis)
        - **Breakdown** (optional) — series split dimension

        ### Chart types
        - `type: bar` with `mode: stacked` (default), `unstacked`, `percentage`
        - `type: line`
        - `type: area` with `mode: stacked` (default), `unstacked`, `percentage`

        ### Dimension types (`dimension:` and `breakdown:`)
        - `type: values` — top values/terms with `field`, `size`, `show_other_bucket`,
          `include_missing_values`, `include`/`exclude` (regex support), `collapse`
        - `type: date_histogram` — with `field`, `minimum_interval`,
          `partial_intervals`
        - `type: intervals` — numeric ranges with `granularity`, `empty_bucket`
        - `type: filters` — KQL filter-based with `filters: [{query, label}]`
        - Multi-field terms via `fields: [field1, field2]` (min 2)

        ### Metric types (`metrics:`)
        All standard aggregations: `count`, `sum`, `average`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `percentile_rank`,
        `standard_deviation`
        - `formula` — tinymath expressions including `counter_rate()`,
          `cumulative_sum()`, `differences()`, `moving_average(window=N)`,
          `overall_sum()`, `overall_avg()`, etc.
        - Static values via `value: N`
        - Per-metric `axis: left | right` for dual-axis
        - Per-metric `color` for custom series color

        ### Reference lines (Lens-only multi-layer feature)
        Added via `layers:` with `type: reference_line`:
        - `value` — static float
        - `label` — display text
        - `axis` — `left` or `right`
        - `color` — hex color
        - `line_width` — 1-10
        - `line_style` — `solid`, `dashed`, `dotted`
        - `fill` — `above`, `below`, `none`
        - `icon` and `icon_position`

        ### Axis configuration (`appearance:`)
        - `x_axis`, `y_left_axis`, `y_right_axis`:
          - `title` — boolean (false=hidden, true=auto) or string (custom label)
          - `scale` — `linear`, `log`, `sqrt`, `time`
          - `extent.mode` — `full`, `custom`, `data_bounds`
          - `extent.min`, `extent.max` — custom bounds
          - `extent.enforce` — strict enforcement
          - `extent.nice_values` — rounded values

        ### Line/Area-specific appearance
        - `missing_values` — `None`, `Linear`, `Carry`, `Lookahead`,
          `Average`, `Nearest`
        - `show_as_dotted` — distinguish interpolated data
        - `end_values` — `None`, `Zero`, `Nearest`
        - `line_style` — `linear`, `monotone-x`, `step-after`
        - `fill_opacity` — 0.0-1.0 (area charts)

        ### Bar-specific appearance
        - `min_bar_height` — minimum bar pixel height

        ### Other appearance
        - `show_current_time_marker` — boolean
        - `hide_endzones` — boolean

        ### Legend (`legend:`)
        - `visible` — `show`, `hide`, `auto`
        - `position` — `top`, `bottom`, `left`, `right`
        - `show_single_series` — boolean
        - `width` — `small`, `medium`, `large`, `extra_large`
        - `truncate_labels` — 0-5 lines

        ### Value labels (`appearance.values:`)
        - `visible` — boolean (`true` to show, `false` to hide)

        ### Color (`color:`)
        - `palette` — categorical color scheme
        - `assignments` — manual value-to-color mappings

        ## Creative exploration
        After covering the feature matrix, try interesting combinations:
        - Dual-axis line chart: bytes on left, count on right
        - Bar chart with reference line at percentile threshold + fill above
        - Area chart with `step-after` curve + `fill_opacity: 0.3`
        - Line chart with `missing_values: Linear` + `show_as_dotted: true`
        - Stacked bar with filters dimension + custom color assignments
        - Formula metric: `moving_average(count(), window=7)` as line overlay
        - Percentage stacked area with 3 breakdown terms
        - XY chart with `log` scale y-axis + custom extent
        - Multiple reference lines (warning threshold + critical threshold)
        - Bar chart inside a collapsible section panel

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
