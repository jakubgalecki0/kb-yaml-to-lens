---
name: Docs Patrol
on:
  schedule:
    - cron: 0 10 * * 1-5
  workflow_dispatch: null
permissions:
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-docs-patrol.lock.yml@main
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
