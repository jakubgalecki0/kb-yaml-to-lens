---
name: 'Explore: ES|QL Datatable'
on:
  schedule:
    - cron: 10 13 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-esql-datatable-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-esql-datatable-${{ matrix.kibana_version }}]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the ES|QL Datatable Explorer for kb-yaml-to-lens.
        You are the ONLY agent with access to a live Kibana instance and Playwright.
        Any agent can read code ‚Äî your unique value is verifying things in the actual UI.
        **You MUST use Playwright and Kibana. Code-only analysis is not acceptable.**
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for ES|QL **datatable** panels
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## ES|QL query configuration
        Queries can be specified as:
        - A single string or list of strings (joined with pipes)
        - `time_field` (optional, default: `@timestamp`) ‚Äî used for time picker

        ## ES|QL column configuration
        - `field` (required) ‚Äî field name from ES|QL query result
        - `label` (optional) ‚Äî custom display label
        - `format` (optional) ‚Äî `number`, `bytes`, `bits`, `percent`, `duration`
          with `decimals`, `suffix`, `compact`; or custom `pattern`

        ## Compiler-supported features to test

        ### Config slots
        - **metrics** (optional) ‚Äî metric columns
        - **dimensions** (optional) ‚Äî row grouping columns
        - **dimensions_by** (optional) ‚Äî split metrics by dimension values
        - At least one metric OR dimension is required

        ### Per-column appearance (metrics and dimensions)
        - `appearance.width` ‚Äî column width in pixels
        - `appearance.hidden` ‚Äî hide column (boolean)
        - `appearance.one_click_filter` ‚Äî click-to-filter (boolean)
        - `appearance.alignment` ‚Äî `left`, `right`, `center`

        ### Metric column extras
        - `appearance.summary_row` ‚Äî `none`, `sum`, `avg`, `count`, `min`, `max`
        - `appearance.summary_label` ‚Äî custom label for summary row
        - `appearance.color` ‚Äî cell/text coloring:
          - `apply_to` ‚Äî `none`, `cell`, `text`
          - `range_type` ‚Äî `number` or `percent`
          - `range_min`, `range_max`, `continuity`
          - `stops` ‚Äî color range `[{stop, color}]`

        ### Table layout (`appearance:`)
        - `row_height` ‚Äî `auto`, `single`, `custom`
        - `row_height_lines` ‚Äî lines for custom height
        - `header_row_height` ‚Äî `auto`, `single`, `custom`
        - `header_row_height_lines`
        - `density` ‚Äî `compact`, `normal`, `expanded`

        ### Sorting and pagination
        - `sorting.column_id`, `sorting.direction` (`asc`/`desc`)
        - `paging.enabled` (boolean), `paging.page_size` (number, default: 10)

        ## NOT implemented for ES|QL (do NOT flag as bugs)
        - **Transpose** ‚Äî Kibana supports this but compiler does not
        - **Formula metrics** ‚Äî ES|QL uses query-computed columns, not formulas
        - **Panel-level filters** ‚Äî all filtering must be in the ES|QL query
        - Tooltip configuration ‚Äî no compiler option

        ## Creative exploration
        - ES|QL datatable with `STATS count = COUNT(), avg = AVG(bytes) BY host.name`
        - ES|QL datatable with multiple STATS columns + sorting
        - ES|QL datatable with summary rows on metric columns
        - ES|QL datatable with cell color gradient (green/yellow/red)
        - ES|QL datatable with mixed alignment: left dimensions, right metrics
        - ES|QL datatable with hidden column for sorting only
        - ES|QL datatable with compact density + custom row height
        - ES|QL datatable with pagination (page_size: 25)
        - Compare ES|QL datatable vs equivalent Lens datatable side-by-side

        ## Verification process
        Read `.github/agent-guides/explore-verification.md` for the full
        verification process, fields to ignore in diffs, classification
        rules, and deliverable format.

        The issue title MUST follow this format:
        `[explore-esql-datatable-${{ matrix.kibana_version }}] N bugs, M gaps`

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
