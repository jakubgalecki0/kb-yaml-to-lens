---
name: 'Explore: Lens Gauge'
on:
  schedule:
    - cron: 20 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-lens-gauge-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.14.0","8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-lens-gauge-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for **gauge** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders
        correctly.
        Data views: `logs-*`, `metrics-*`.

        ## Compiler-supported features to test

        ### Config slots (Kibana editor drop zones)
        - **Metric** (required) — the gauge value
        - **Minimum value** (optional) — static number OR field-based metric
        - **Maximum value** (optional) — static number OR field-based metric
        - **Goal value** (optional) — static number OR field-based metric

        ### Gauge shapes (`appearance.shape`)
        - `horizontal_bullet` — horizontal linear gauge (default)
        - `vertical_bullet` — vertical linear gauge
        - `arc` — partial arc
        - `circle` — full circle
        - `semi_circle` — half circle

        ### Titles and text
        - `label_major` — main title text (maps to Kibana Title: Auto/Custom/None)
        - `label_minor` — subtitle text (maps to Kibana Subtitle: Custom/None)

        ### Tick marks (`appearance.ticks_position`)
        - `auto` — Kibana default
        - `bands` — show at color band boundaries
        - `hidden` — no tick marks

        ### Color palette (`appearance.palette`)
        Color range-based mapping for gauge bands:
        - `range_type` — `number` or `percent`
        - `range_min`, `range_max` — bounds (null for open)
        - `continuity` — `above`, `below`, `all`, `none`
        - `stops` — list of `{stop, color}` objects (must be ascending)

        ### Metric aggregation types
        All standard aggregations: `count`, `sum`, `average`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `percentile_rank`,
        `standard_deviation`, `formula`

        ### Number format
        - `format` on metric: `number`, `bytes`, `bits`, `percent`, `duration`,
          or custom numeral.js pattern

        ## Creative exploration
        After covering the feature matrix, try interesting combinations:
        - Arc gauge with 3-color bands (green/yellow/red) + percent format
        - Circle gauge with goal line + field-based maximum
        - Horizontal bullet with open upper bound (`range_max: null`)
        - Semi-circle with formula metric `average(field='cpu.pct') * 100`
        - Gauge with static minimum=0, static maximum=100, dynamic goal
        - All 5 shapes side-by-side on one dashboard
        - Color bands with `continuity: none` vs `continuity: all`

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
