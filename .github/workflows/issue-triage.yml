---
name: Issue Triage
on:
  issues:
    types:
      - opened
permissions:
  actions: read
  contents: read
  discussions: write
  issues: write
  pull-requests: write
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-issue-triage.lock.yml@main
    with:
      setup-commands: make install-just && uv sync
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
