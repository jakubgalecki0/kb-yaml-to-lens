---
name: 'Explore: Lens Partition (Waffle/Mosaic)'
on:
  schedule:
    - cron: 40 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: 'Kibana version to test (leave empty for all)'
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: write
  discussions: write
  id-token: write
concurrency:
  group: explore-lens-partition-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-internal-gemini-cli.lock.yml@main
    with:
      title-prefix: '[explore-lens-partition-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        uv sync
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You are running the Lens Partition Explorer for kb-yaml-to-lens.
        You are the ONLY agent with access to a live Kibana instance and Playwright.
        Any agent can read code — your unique value is verifying things in the actual UI.
        **You MUST use Playwright and Kibana. Code-only analysis is not acceptable.**
        **IMPORTANT**: Read `.github/agent-guides/kibana-lens-playwright.md` FIRST.

        ## Mission
        Systematically test every config option for **waffle and mosaic** Lens
        charts against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.

        ## Inputs
        - Kibana URL: `http://localhost:5601`
        - Elasticsearch URL: `http://localhost:9200`
        - Data views: `logs-*`, `metrics-*`
        - Kibana version: `${{ matrix.kibana_version }}`
        - Elasticsearch and Kibana are pre-provisioned. Do NOT run bootstrap scripts.

        ## Compiler-supported features to test

        ### Waffle chart (`type: waffle`)
        Config slots in Kibana: **Group by** (optional), **Metric** (required)

        - `dimension` — primary grouping dimension (maps to "Group by")
        - `metric` — single metric for cell proportions
        - `color.palette` — categorical color palette
        - `color.assignments` — manual value-to-color mappings
        - `legend` — `visible`, `position`, `width`, `truncate_labels`, `nested`,
          `show_single_series`
        - `titles_and_text.value_format` — `percent`, `value`, `hidden`
        - `titles_and_text.value_decimal_places` — 0-10

        **Known Kibana limitations for Waffle:**
        - Waffle does NOT have a Maximum value slot (unlike Metric)
        - Waffle does NOT have a Breakdown slot — using `breakdown` in YAML may
          cause "too many dimensions" error in Kibana. This is a known issue.

        ### Mosaic chart (`type: mosaic`)
        Config slots in Kibana: **Horizontal axis**, **Vertical axis**, **Metric**

        - `dimension` — horizontal axis terms dimension
        - `breakdown` — vertical axis terms dimension
        - `metric` — single metric for rectangle proportions
        - `color.palette` — categorical color palette
        - `color.assignments` — manual value-to-color mappings
        - `legend` — same options as waffle
        - `titles_and_text.value_format` — `percent`, `value`, `hidden`
        - `titles_and_text.value_decimal_places` — 0-10

        ### Shared dimension types
        - `type: values` — top values with `field`, `size`, `other_bucket`
        - `type: date_histogram` — time bucketing
        - `type: intervals` — numeric ranges
        - `type: filters` — KQL filter-based

        ### Shared metric types
        All standard aggregations: `count`, `sum`, `average`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `percentile_rank`,
        `standard_deviation`, `formula`

        ## NOT implemented in compiler (do NOT flag as bugs)
        - **Treemap** — Kibana has Treemap charts but the compiler does NOT
          support treemap. Do not test treemap features.
        - **Waffle maximum value** — Kibana's waffle does not have a maximum
          value slot either, so this is not a gap.
        - **Waffle breakdown** — compiler allows it but Kibana rejects it
          with "too many dimensions" in 8.19.0. Document behavior per version.
        - Tooltip configuration — no compiler option

        ## Creative exploration
        After covering the feature matrix, try interesting combinations:
        - Waffle with top 10 terms + custom color assignments per value
        - Mosaic with two terms dimensions + count metric
        - Waffle with formula metric
        - Mosaic with `value_format: percent` + 2 decimal places
        - Both chart types with `legend.nested: true`
        - Partition charts inside collapsible sections

        ## Verification process
        Read `.github/agent-guides/explore-verification.md` for the full
        verification process, fields to ignore in diffs, classification
        rules, and deliverable format.

        The issue title MUST follow this format:
        `[explore-lens-partition-${{ matrix.kibana_version }}] N bugs, M gaps`

        Do not create branches or pull requests.
    secrets:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
