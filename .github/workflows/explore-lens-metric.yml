---
name: 'Explore: Lens Metric'
on:
  schedule:
    - cron: 10 11 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-workflows-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.14.0","8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-lens-metric-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for **metric** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders
        correctly in the Kibana editor and preview.
        Data views: `logs-*`, `metrics-*`.

        ## Compiler-supported features to test

        ### Config slots (Kibana editor drop zones)
        - **Primary metric** (required) — the main displayed value
        - **Secondary metric** (optional) — comparison value below primary
        - **Maximum value** (optional) — enables progress bar / background chart
        - **Break down by** (optional) — splits into multiple metric tiles

        ### Aggregation types for metrics
        - `count`, `sum`, `average`, `min`, `max`, `median`, `standard_deviation`
        - `unique_count` — cardinality
        - `last_value` — most recent value, with optional `date_field`
        - `percentile` — requires `percentile` param (0-100)
        - `percentile_rank` — requires `rank` param
        - `formula` — Kibana tinymath expressions (e.g. `count() * 2`,
          `sum(field='bytes') / count()`)

        ### Advanced metric options
        - `filter` — KQL filter per metric (e.g. `filter: "status: error"`)
        - `format` — `number`, `bytes`, `bits`, `percent`, `duration`, or custom
          numeral.js pattern with `decimals`, `suffix`, `compact`
        - `label` — override display name
        - `exclude_zeros` — hide zero values (boolean)
        - Time shift — via formula syntax `count(shift='1d')`
        - Reduced time range — via formula syntax

        ### Appearance options (`appearance:`)
        - `primary.position` — `top` or `bottom`
        - `primary.alignment` — `left`, `center`, `right`
        - `primary.font_size` — `default` or `fit`
        - `primary.icon` — icon identifier
        - `primary.icon_position` — `left` or `right`
        - `primary.background_chart.type` — `line`, `bar`, or `none`
        - `primary.background_chart.direction` — `horizontal` or `vertical` (bar only)
        - `secondary.label_position` — `before` or `after`
        - `secondary.alignment` — `left`, `center`, `right`
        - `breakdown.column_count` — max columns for multi-metric tiles

        ### Title and text (`titles_and_text:`)
        - `subtitle` — custom subtitle text
        - `alignment` — `left`, `center`, `right`
        - `weight` — `bold`, `normal`, `lighter`

        ### Color options (`color:`)
        - `palette` — `eui_amsterdam_color_blind`, `default`, `kibana_palette`,
          `elastic_brand`, `gray`
        - `assignments` — manual value-to-color mappings
        - `apply_to` — `value` or `background`
        - Dynamic coloring with color range stops

        ### Dimension types for breakdown
        - `type: values` — top values / terms with `field`, `size`, `show_other_bucket`
        - `type: date_histogram` — with `minimum_interval`
        - `type: intervals` — numeric ranges
        - `type: filters` — KQL filter-based dimension

        ## Creative exploration
        After covering the feature matrix above, try interesting combinations:
        - Metric with formula `count(kql='status:error') / count() * 100` +
          percent format + dynamic color thresholds
        - Background bar chart with maximum value + custom color stops
        - Breakdown by top 5 hosts with per-tile icons
        - Secondary metric showing previous period via time shift formula
        - Multiple format types on same dashboard (bytes, percent, duration)
        - Metric inside a collapsible section panel

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
