---
name: 'Explore: ES|QL Tag Cloud'
on:
  schedule:
    - cron: 30 13 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-esql-tagcloud-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-esql-tagcloud-${{ matrix.kibana_version }}]'
      setup-commands: |
        command -v just >/dev/null 2>&1 || make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for ES|QL **tag cloud** charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.
        Data views: `logs-*`, `metrics-*`.

        ## ES|QL query configuration
        Queries can be specified as:
        - A single string or list of strings (joined with pipes)
        - `time_field` (optional, default: `@timestamp`) — used for time picker
        - Example: `FROM logs-* | STATS count = COUNT() BY host.name | SORT count DESC | LIMIT 50`

        ## ES|QL column configuration
        - `field` (required) — field name from ES|QL query result
        - `label` (optional) — custom display label
        - `data_type` (optional) — set to `'date'` for time/date fields
        - `collapse` (optional) — aggregation: `sum`, `avg`, `min`, `max`
        - `format` (optional for metrics) — `number`, `bytes`, `bits`, `percent`,
          `duration` with `decimals`, `suffix`, `compact`; or custom `pattern`

        ## Compiler-supported features to test

        ### Config slots
        - **dimension** (required) — tags/grouping column from query result
        - **metric** (required) — determines tag size

        ### Appearance (`appearance:`)
        - `min_font_size` — minimum font size in pixels (1-100, default: 12)
        - `max_font_size` — maximum font size in pixels (1-200, default: 72)
        - `orientation` — `single` (default, all horizontal), `right angled`
          (mix of 0° and 90°), `multiple` (multiple angles)
        - `show_label` — boolean (default: true)

        ### Color (`color:`)
        - `palette` — categorical color scheme (e.g. `eui_amsterdam_color_blind`,
          `default`, `kibana_palette`, `elastic_brand`, `gray`)
        - `assignments` — manual value-to-color hex mappings

        ## Creative exploration
        - ES|QL tag cloud with `STATS count = COUNT() BY host.name`
        - ES|QL tag cloud with `right angled` orientation + large font range
        - ES|QL tag cloud with `multiple` orientation
        - ES|QL tag cloud with custom color assignments per tag value
        - ES|QL tag cloud with `show_label: false`
        - ES|QL tag cloud with bytes format on metric
        - Compare ES|QL tag cloud vs equivalent Lens tag cloud side-by-side

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
