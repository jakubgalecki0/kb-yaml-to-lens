---
name: 'Explore: Lens Tag Cloud'
on:
  schedule:
    - cron: 10 12 * * 1-5
  workflow_dispatch:
    inputs:
      kibana_version:
        description: Kibana version to test (leave empty for all)
        required: false
        type: string
        default: ''
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
concurrency:
  group: explore-workflows-${{ github.ref }}
  cancel-in-progress: false
jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          INPUT_VERSION="${{ inputs.kibana_version }}"
          if [ -n "$INPUT_VERSION" ]; then
            echo "matrix={\"kibana_version\":[\"$INPUT_VERSION\"]}" >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"kibana_version":["8.14.0","8.19.0","9.3.0"]}' >> "$GITHUB_OUTPUT"
          fi
  explore:
    needs: generate-matrix
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJSON(needs.generate-matrix.outputs.matrix) }}
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@main
    with:
      title-prefix: '[explore-lens-tagcloud-${{ matrix.kibana_version }}]'
      setup-commands: |
        make install-just
        just all install
        npx playwright install chromium
        just explore-bootstrap ${{ matrix.kibana_version }}
      additional-instructions: |
        You MUST read `.github/agent-guides/explore-agents/getting-started.md`
        and all instruction files it references BEFORE starting any work.

        ## Mission
        Systematically test every config option for **tag cloud** Lens charts
        against **Kibana ${{ matrix.kibana_version }}**. Author YAML configs,
        compile them, import into Kibana, and verify every setting renders correctly.
        Data views: `logs-*`, `metrics-*`.

        ## Compiler-supported features to test

        ### Config slots
        - **dimension** (required) â€” tags/grouping dimension
        - **metric** (required) â€” determines tag size

        ### Dimension types
        - `type: values` â€” top values/terms with `field`, `size`, `show_other_bucket`,
          `include_missing_values`, `include`/`exclude` (regex support), `collapse`
        - `type: date_histogram` â€” with `field`, `minimum_interval`,
          `partial_intervals`
        - `type: intervals` â€” numeric ranges with `granularity`
        - `type: filters` â€” KQL filter-based with `filters: [{query, label}]`
        - Multi-field terms via `fields: [field1, field2]` (min 2)

        ### Metric types
        All standard aggregations: `count`, `sum`, `average`, `min`, `max`,
        `median`, `unique_count`, `last_value`, `percentile`, `percentile_rank`,
        `standard_deviation`, `formula`
        - Static values via `value: N`

        ### Appearance (`appearance:`)
        - `min_font_size` â€” minimum font size in pixels (1-100, default: 12)
        - `max_font_size` â€” maximum font size in pixels (1-200, default: 72)
        - `orientation` â€” `single` (default, all horizontal), `right angled`
          (mix of 0Â° and 90Â°), `multiple` (multiple angles including diagonal)
        - `show_label` â€” boolean (default: true)

        ### Color (`color:`)
        - `palette` â€” categorical color scheme (e.g. `eui_amsterdam_color_blind`,
          `default`, `kibana_palette`, `elastic_brand`, `gray`)
        - `assignments` â€” manual value-to-color hex mappings
          `[{value: "term", color: "#hex"}]`

        ## Creative exploration
        After covering the feature matrix, try interesting combinations:
        - Tag cloud with top 20 terms + custom color assignments per value
        - Tag cloud with `right angled` orientation + large font range (8-120)
        - Tag cloud with `multiple` orientation + formula metric
        - Tag cloud with filters dimension (error vs warning vs info)
        - Tag cloud with `show_label: false` + `min_font_size: 24`
        - Tag cloud with multi-field terms dimension
        - Tag cloud with unique_count metric
        - Tag cloud inside a collapsible section

        ## Issue title
        The workflow automatically prefixes your title. Just provide the
        summary, e.g. `3 bugs, 2 gaps`
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
