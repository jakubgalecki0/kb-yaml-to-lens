---
name: 'Audit: Explore Workflow Health'
on:
  schedule:
    - cron: 0 13 * * 1-5
  workflow_dispatch: null
permissions:
  actions: read
  contents: read
  issues: write
  pull-requests: read
jobs:
  run:
    uses: elastic/ai-github-actions/.github/workflows/gh-aw-scheduled-audit.lock.yml@5c3bbdc100f39ca59186288035c6b01797d5205e
    with:
      title-prefix: '[explore-workflow-health]'
      additional-instructions: |
        You are auditing the health of explore agent workflow runs in this repo.
        Your job is to find systemic infrastructure issues that prevent agents
        from completing their work — NOT to judge the quality of their output.

        ## Process
        1. Use `gh run list` to find the **10 most recent completed** runs
           whose workflow name starts with "Explore:". Include both successful
           and failed runs.
        2. For each run, use `gh run view <id> --log` and search for these
           failure patterns:

        ### Failure categories to check
        **Networking failures**
        - `Failed to connect to localhost port 5601` — agent used localhost
          instead of host.docker.internal for shell commands
        - `Failed to connect to host.docker.internal port 5601` — Kibana not
          reachable from container (bootstrap or binding issue)
        - `curl: (28)` or `curl: (7)` — connection timeout or refused
        - `Connection refused` in uv/python output
        **MCP server crashes**
        - `MCP ERROR (playwright)` — Playwright MCP server crashed
        - `MCP ERROR (github)` — GitHub MCP server crashed
        - `MCP ERROR (safeoutputs)` — safe outputs MCP server crashed
        - `connection closed: calling "tools/call"` — MCP connection lost
        - Multiple MCP servers crashing simultaneously (infrastructure issue)
        **Playwright issues**
        - `browser_file_upload` errors — file chooser modal issues
        - `browser_snapshot` or `browser_click` failures
        - `Loading Elastic` stuck (Kibana never finished loading)
        - `Target page, context or browser has been closed`
        **CLI / compile failures**
        - `uv run kb-dashboard compile` errors
        - `uv run kb-dashboard fetch` errors
        - `Cannot connect to the Docker daemon` — agent tried docker commands
        **Agent behavior issues**
        - Zero `browser_` tool calls in the entire run (agent skipped Playwright)
        - Zero `mcp_playwright_` tool calls (same issue, different tool naming)
        - Agent only made `read_file`, `grep`, `replace` calls (pure code analysis)
        3. For each run, record:
           - Run ID and workflow name
           - Whether the agent used Playwright at all (count of browser tool calls)
           - Any failure patterns found (with the log line)
           - Whether the run produced a useful deliverable (issue or comment)

        ## Deliverable
        Create one GitHub issue summarizing findings:
        **Title:** `N runs checked, M healthy, K with issues`
        **Body:**
        - Summary table: run ID, workflow, date, browser calls count, status
        - For each unhealthy run: failure category, exact error, and whether
          it's an infrastructure issue or an agent behavior issue
        - Trends: are the same failures repeating? Getting better or worse?
        - Recommendations: what should be fixed (infra, prompts, bootstrap)
        If all runs are healthy, still create the issue confirming that.
        Do not create branches or pull requests.
    secrets:
      COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
