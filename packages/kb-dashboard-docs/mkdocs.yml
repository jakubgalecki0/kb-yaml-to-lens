---
site_name: Dashboard Compiler Documentation
site_description: Convert human-friendly YAML dashboard definitions into Kibana NDJSON format
site_url: https://strawgate.github.io/kb-yaml-to-lens/
repo_url: https://github.com/strawgate/kb-yaml-to-lens
repo_name: strawgate/kb-yaml-to-lens
edit_uri: edit/main/packages/kb-dashboard-docs/content/
docs_dir: content
site_dir: site
theme:
  name: material
  logo: images/chameleon.png
  favicon: images/chameleon.png
  palette:
    # Palette toggle for light mode
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.path
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.action.view
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - ../kb-dashboard-core/src
            - ../kb-dashboard-cli/src
            - ../kb-dashboard-lint/src
          inventories:
            - url: https://docs.python.org/3/objects.inv
          options:
            show_source: false
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            signature_crossrefs: true
            separate_signature: true
            line_length: 80
            show_bases: false
            members_order: source
            show_if_no_docstring: false
            extensions:
              - griffe_pydantic:
                  schema: true
              - griffe_fieldz:
                  include_inherited: false
                  include_private: false
                  add_fields_to: docstring-attributes
                  remove_fields_from_members: true
                  strip_annotated: false
hooks:
  - src/hooks/generate_llms_txt.py
extra:
  llms_nav:
    - index.md
    - CLI.md
    - examples/index.md
    - dashboard/dashboard.md
    - panels/base.md
    - panels/auto-layout.md
    - panels/drilldowns.md
    - panels/links.md
    - panels/markdown.md
    - panels/section.md
    - panels/lens.md
    - panels/esql.md
    - panels/datatable.md
    - panels/gauge.md
    - panels/heatmap.md
    - panels/metric.md
    - panels/mosaic.md
    - panels/pie.md
    - panels/tagcloud.md
    - panels/treemap.md
    - panels/waffle.md
    - panels/xy.md
    - panels/image.md
    - panels/search.md
    - controls/config.md
    - filters/config.md
    - queries/config.md
    - guides/index.md
    - guides/breaking-changes.md
    - guides/dashboard-decompiling-guide.md
    - guides/dashboard-style-guide.md
    - guides/esql-language-reference.md
    - guides/otel-dashboard-guide.md
    - guides/color-assignments.md
    - guides/legend-configuration.md
    - guides/esql-views.md
markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - content
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true
  - mkdocs-click
nav:
  - User Guide:
      - Getting Started: index.md
      - CLI Reference: CLI.md
      - VS Code Extension: vscode-extension.md
      - Complete Examples: examples/index.md
      - Dashboard Configuration: dashboard/dashboard.md
      - Chart Panels:
          - Overview: panels/base.md
          - Lens Panel: panels/lens.md
          - ESQL Panel: panels/esql.md
          - Datatable Chart: panels/datatable.md
          - Gauge Chart: panels/gauge.md
          - Heatmap Chart: panels/heatmap.md
          - Metric Chart: panels/metric.md
          - Mosaic Chart: panels/mosaic.md
          - Pie Chart: panels/pie.md
          - Tag Cloud Chart: panels/tagcloud.md
          - Treemap Chart: panels/treemap.md
          - Waffle Chart: panels/waffle.md
          - XY Chart: panels/xy.md
      - Other Panels:
          - Auto-Layout Guide: panels/auto-layout.md
          - Drilldowns: panels/drilldowns.md
          - Links Panel: panels/links.md
          - Markdown Panel: panels/markdown.md
          - Section Panel: panels/section.md
          - Image Panel: panels/image.md
          - Search Panel: panels/search.md
      - Dashboard Controls: controls/config.md
      - Filters & Queries:
          - Filters: filters/config.md
          - Queries: queries/config.md
      - Advanced Guides:
          - Overview: guides/index.md
          - Breaking Changes: guides/breaking-changes.md
          - Dashboard Decompiling Guide: guides/dashboard-decompiling-guide.md
          - Dashboard Style Guide: guides/dashboard-style-guide.md
          - ES|QL Language Reference: guides/esql-language-reference.md
          - OTel Dashboard Guide: guides/otel-dashboard-guide.md
          - Custom Color Assignments: guides/color-assignments.md
          - Legend Configuration: guides/legend-configuration.md
          - ES|QL "views": guides/esql-views.md
  - Developer Guide:
      - Programmatic Usage: programmatic-usage.md
      - Architecture: architecture.md
      - API Reference:
          - api/index.md
          - Dashboard API: api/dashboard.md
          - Panels API: api/panels.md
          - Controls API: api/controls.md
          - Filters API: api/filters.md
          - Queries API: api/queries.md
