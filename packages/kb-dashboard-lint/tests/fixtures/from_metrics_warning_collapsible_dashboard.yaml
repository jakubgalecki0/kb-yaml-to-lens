---
dashboards:
  - id: from-metrics-warning-collapsible
    name: "[Test] FROM metrics warning in section"
    description: Dashboard fixture to verify FROM metrics-* lint warning inside section panels.
    minimum_kibana_version: "9.2.0"
    panels:
      - title: Section A
        section:
          collapsed: true
          panels:
            - title: CPU by host
              size: {w: 24, h: 15}
              esql:
                type: line
                dimension:
                  field: time_bucket
                  label: Time
                  data_type: date
                metrics:
                  - field: cpu
                    label: CPU
                query:
                  - FROM metrics-system.cpu-default
                  - STATS cpu = AVG(system.cpu.total.norm.pct) BY time_bucket = BUCKET(@timestamp, 1 minute)
                  - SORT time_bucket ASC
